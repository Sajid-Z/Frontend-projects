<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>
    <div class = "calculator">
        <h1>Arithmatic Calculator</h1>

        <div class = "input-group">
            <label for = "num1"> First Number: </label>
            <input type = "number" id = "num1" placeholder="Enter first number"> 
        </div>

        <div class = "input-group">
            <label for = "num2"> Second Number: </label>
            <input type = "number" id = "num2" placeholder="Enter second number">
        </div>

        <div class = "Button-group">
            <button class = "add-btn" onclick="calculator('add')">+</button>
            <button class = "sub-btn" onclick="calculator('sub')">-</button>
            <button class = "mul-btn" onclick="calculator('mul')">*</button>
            <button class = "div-btn" onclick="calculator('div')">/</button>
            <button class = "mod-btn" onclick="calculator('mod')">%</button>
            <button class = "power-btn" onclick="calculator('pow')">^</button>
            <button class = "clear-btn" onclick="clearFields()">CLEAR</button>
            
        </div>

        <div class = "result-group">
            <h2> Result:  </h2>
            <h2 id = "final_result"> 0 </h2>
        </div>
        <script src="calc.js"></script>
    
</body>
</html>
